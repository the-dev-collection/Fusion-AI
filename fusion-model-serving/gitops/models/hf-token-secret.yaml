# HuggingFace Token Secret for Gated Models
# This secret is required for models that need authentication (e.g., Meta Llama models)
#
# SETUP INSTRUCTIONS:
# 1. Get your HuggingFace token from https://huggingface.co/settings/tokens
# 2. Accept the model license agreement on HuggingFace (e.g., https://huggingface.co/meta-llama/Meta-Llama-3-70B)
# 3. Base64 encode your token: echo -n "your-hf-token" | base64
# 4. Replace YOUR_BASE64_ENCODED_HF_TOKEN below with the encoded value
# 5. Uncomment this file in kustomization.yaml when deploying gated models
#
# SECURITY NOTE:
# - For production, use sealed-secrets or external secret management (Vault, etc.)
# - Never commit actual tokens to Git
# - This template should be customized per environment
#
# CreateOnly=true ensures only the first Application creates this secret.
# Subsequent Applications in the same namespace skip it without conflict.
apiVersion: v1
kind: Secret
metadata:
  name: hf-token-secret
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
    argocd.argoproj.io/sync-options: CreateOnly=true
type: Opaque
data:
  # Replace with your base64-encoded HuggingFace token
  # Example: echo -n "hf_xxxxxxxxxxxxxxxxxxxxx" | base64
  token: YOUR_BASE64_ENCODED_HF_TOKEN

